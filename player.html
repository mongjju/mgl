<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>밸런스 게임</title>
<style>
body { font-family:sans-serif; text-align:center; padding:30px; }
button { font-size:20px; padding:15px 25px; margin:8px; border:none; border-radius:10px; background:#e0e0e0; }
.selected { background:#4CAF50; color:white; }
</style>
</head>
<body>

<h2>밸런스 게임</h2>
<input id="name" placeholder="이름 입력"><br><br>

<div id="question-container">
  <h3 id="q-title">1번 문제</h3>
  <button id="a-btn" onclick="select(0,this)">A</button>
  <button id="b-btn" onclick="select(1,this)">B</button><br><br>
  <button onclick="submitAnswer()">제출</button>
</div>

<script>
const questions = [
  {num:1, points:[0,1]}, 
  {num:2, points:[0,1]}, 
  {num:3, points:[0,2]}
];

let current = 0;
let answers = [];
let name = "";

function select(val, btn){
  document.getElementById("a-btn").classList.remove("selected");
  document.getElementById("b-btn").classList.remove("selected");
  btn.classList.add("selected");
  answers[current] = val;
}

function submitAnswer(){
  name = document.getElementById("name").value.trim();
  if(!name){ alert("이름을 입력해주세요."); return; }
  if(answers[current]===undefined){ alert("선택을 해주세요."); return; }

  // Web App에 제출
  fetch("https://script.google.com/macros/s/AKfycbxa1G7eeZwrxuxd5V4hLYoTB7O6dDkh0XvSnmRuaZNX93S0jHUlqYUpDA-CjNbfjOCn/exec", {
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`name=${encodeURIComponent(name)}&q=${current+1}&score=${answers[current]}`
  }).then(res=>res.text())
    .then(()=> {
      current++;
      if(current<questions.length){
        // 다음 문제 표시
        document.getElementById("q-title").innerText = `${questions[current].num}번 문제`;
        document.getElementById("a-btn").classList.remove("selected");
        document.getElementById("b-btn").classList.remove("selected");
      }else{
        alert("모든 문제 제출 완료!");
        document.getElementById("question-container").innerHTML = "<h3>제출 완료!</h3>";
      }
    }).catch(()=> alert("서버와 연결 실패"));
}
</script>
</body>
</html>
