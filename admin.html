<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>밸런스 게임 관리자</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family:sans-serif; padding:20px; }
h2 { text-align:center; }
.chart-container { width: 300px; margin: 20px auto; }
table { width:80%; margin:auto; border-collapse: collapse; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
</style>
</head>
<body>

<h2>밸런스 게임 관리자 화면</h2>

<div class="chart-container">
  <canvas id="q1Chart"></canvas>
</div>
<div class="chart-container">
  <canvas id="q2Chart"></canvas>
</div>
<div class="chart-container">
  <canvas id="q3Chart"></canvas>
</div>

<h3>참가자 점수</h3>
<table id="scoreTable">
  <thead>
    <tr>
      <th>이름</th>
      <th>Q1</th>
      <th>Q2</th>
      <th>Q3</th>
      <th>총점</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const WEB_APP_URL = "웹앱_URL/exec"; // doGet로 JSON 가져오기

let q1Chart, q2Chart, q3Chart;

// 차트 초기화
function initCharts() {
  const ctx1 = document.getElementById("q1Chart").getContext("2d");
  const ctx2 = document.getElementById("q2Chart").getContext("2d");
  const ctx3 = document.getElementById("q3Chart").getContext("2d");

  q1Chart = new Chart(ctx1, {
    type: 'pie',
    data: { labels:['A','B'], datasets:[{data:[0,0], backgroundColor:['#4CAF50','#2196F3']}] }
  });
  q2Chart = new Chart(ctx2, {
    type: 'pie',
    data: { labels:['A','B'], datasets:[{data:[0,0], backgroundColor:['#4CAF50','#2196F3']}] }
  });
  q3Chart = new Chart(ctx3, {
    type: 'pie',
    data: { labels:['A','B'], datasets:[{data:[0,0], backgroundColor:['#4CAF50','#2196F3']}] }
  });
}

// 데이터 가져와서 차트 + 테이블 갱신
function updateData() {
  fetch(WEB_APP_URL)
    .then(res => res.json())
    .then(data => {
      const rows = data.slice(1); // 첫 줄 헤더 제외
      let q1Count=[0,0], q2Count=[0,0], q3Count=[0,0];
      const tbody = document.querySelector("#scoreTable tbody");
      tbody.innerHTML = "";

      rows.forEach(row => {
        const name=row[0], q1=row[1], q2=row[2], q3=row[3], total=row[4];
        q1Count[q1]++; q2Count[q2]++; q3Count[q3==2?1:q3]++; // Q3는 0/2라 2를 1로 변환
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${name}</td><td>${q1}</td><td>${q2}</td><td>${q3}</td><td>${total}</td>`;
        tbody.appendChild(tr);
      });

      // 점수 내림차순 정렬
      const sortedRows = Array.from(tbody.children).sort((a,b)=> b.children[4].innerText - a.children[4].innerText);
      tbody.innerHTML = "";
      sortedRows.forEach(tr=>tbody.appendChild(tr));

      q1Chart.data.datasets[0].data = q1Count;
      q2Chart.data.datasets[0].data = q2Count;
      q3Chart.data.datasets[0].data = q3Count;
      q1Chart.update(); q2Chart.update(); q3Chart.update();
    });
}

initCharts();
updateData();
setInterval(updateData, 3000); // 3초마다 갱신
</script>

</body>
</html>
