<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>밸런스 게임 - 관리자</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #f5f5f5;
  color: #333;
  padding: 24px;
}
h1 {
  text-align: center;
  font-size: 32px;
  margin-bottom: 8px;
}
.header-sub {
  text-align: center;
  color: #888;
  font-size: 14px;
  margin-bottom: 32px;
}
.header-sub .count { color: #667eea; font-weight: 700; }

/* QR 섹션 */
.qr-section {
  text-align: center;
  margin-bottom: 40px;
}
.qr-section canvas {
  border: 4px solid white;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.qr-url {
  margin-top: 12px;
  font-size: 13px;
  color: #888;
  word-break: break-all;
}
.qr-url a { color: #667eea; text-decoration: none; }

/* 문제별 차트 */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 24px;
  max-width: 1100px;
  margin: 0 auto 40px;
}
.chart-card {
  background: white;
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}
.chart-title {
  font-size: 14px;
  color: #667eea;
  font-weight: 700;
  margin-bottom: 4px;
}
.chart-title {
  font-size: 20px;
  margin-bottom: 16px;
}
.chart-wrapper {
  position: relative;
  height: 200px;
}
.chart-labels {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 12px;
}
.chart-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  font-weight: 600;
}
.chart-label .dot {
  width: 12px; height: 12px;
  border-radius: 50%;
}
.chart-label .percent {
  color: #888;
  font-weight: 400;
}

/* 점수 테이블 */
.score-section {
  max-width: 700px;
  margin: 0 auto;
}
.score-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.score-header h2 {
  font-size: 24px;
}
.score-header .badge {
  background: #667eea;
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
}
.score-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}
.score-table thead th {
  background: #667eea;
  color: white;
  padding: 14px 16px;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
}
.score-table thead th:first-child { text-align: left; padding-left: 20px; }
.score-table tbody td {
  padding: 12px 16px;
  text-align: center;
  border-bottom: 1px solid #f0f0f0;
  font-size: 15px;
}
.score-table tbody td:first-child {
  text-align: left;
  padding-left: 20px;
  font-weight: 600;
}
.score-table tbody tr:last-child td { border-bottom: none; }
.score-table tbody tr:hover { background: #f8f8ff; }
.rank {
  display: inline-flex;
  width: 28px; height: 28px;
  border-radius: 50%;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  margin-right: 8px;
}
.rank-1 { background: #FFD700; color: #7a6200; }
.rank-2 { background: #C0C0C0; color: #555; }
.rank-3 { background: #CD7F32; color: #fff; }
.rank-n { background: #f0f0f0; color: #888; }
.total-score {
  font-weight: 700;
  font-size: 18px;
  color: #667eea;
}
.no-data {
  text-align: center;
  padding: 40px;
  color: #bbb;
  font-size: 15px;
}

/* 리셋 버튼 */
.reset-section {
  text-align: center;
  margin-top: 40px;
}
.reset-btn {
  padding: 10px 24px;
  background: #ff5252;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.reset-btn:hover { opacity: 1; }

.live-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #4CAF50;
  margin-right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>
</head>
<body>

<h1>밸런스 게임</h1>
<p class="header-sub">
  <span class="live-dot"></span>실시간 업데이트 중 &nbsp;|&nbsp;
  참가자 <span class="count" id="player-count">0</span>명
</p>

<!-- QR 코드 -->
<div class="qr-section">
  <canvas id="qrcode"></canvas>
  <div class="qr-url">플레이어 접속 URL: <a id="player-url" href="#" target="_blank"></a></div>
</div>

<!-- 문제별 차트 -->
<div class="charts-grid" id="charts-grid"></div>

<!-- 점수 테이블 -->
<div class="score-section">
  <div class="score-header">
    <h2>참가자 점수</h2>
    <span class="badge" id="score-badge">0명</span>
  </div>
  <table class="score-table">
    <thead>
      <tr>
        <th>참가자</th>
        <th>Q1</th>
        <th>Q2</th>
        <th>Q3</th>
        <th>총점</th>
      </tr>
    </thead>
    <tbody id="score-tbody">
      <tr><td colspan="5" class="no-data">아직 제출된 데이터가 없습니다</td></tr>
    </tbody>
  </table>
</div>

<div class="reset-section">
  <button class="reset-btn" onclick="if(confirm('모든 데이터를 삭제할까요?')) resetData()">데이터 초기화</button>
</div>

<script>
// ========== 문제 설정 (player.html과 동일하게 맞추세요) ==========
const QUESTIONS = [
  { optionA: "A", optionB: "B" },
  { optionA: "A", optionB: "B" },
  { optionA: "A", optionB: "B" }
];

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwUcvq_2q8oXf8Dur3dMXw2eyA0Z6qtZRgfMfEWOPllcFZklDMGR6RLVywiTsLESoG8/exec";

// player.html의 URL - 실제 호스팅 URL로 바꿔주세요
const PLAYER_URL = window.location.href.replace("admin.html", "player.html");

let charts = [];

// QR 코드 생성
function generateQR() {
  QRCode.toCanvas(document.getElementById("qrcode"), PLAYER_URL, {
    width: 200,
    margin: 2,
    color: { dark: "#333", light: "#fff" }
  });
  const urlEl = document.getElementById("player-url");
  urlEl.href = PLAYER_URL;
  urlEl.textContent = PLAYER_URL;
}

// 차트 초기화
function initCharts() {
  const grid = document.getElementById("charts-grid");
  QUESTIONS.forEach((q, i) => {
    const card = document.createElement("div");
    card.className = "chart-card";
    card.innerHTML = `
      <div class="chart-title">Q${i + 1}</div>
      <div class="chart-wrapper"><canvas id="chart-${i}"></canvas></div>
      <div class="chart-labels">
        <div class="chart-label">
          <span class="dot" style="background:#FF6B6B"></span>
          A <span class="percent" id="pct-${i}-a"></span>
        </div>
        <div class="chart-label">
          <span class="dot" style="background:#4DABF7"></span>
          B <span class="percent" id="pct-${i}-b"></span>
        </div>
      </div>
    `;
    grid.appendChild(card);

    const ctx = document.getElementById(`chart-${i}`).getContext("2d");
    charts[i] = new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: [q.optionA, q.optionB],
        datasets: [{
          data: [0, 0],
          backgroundColor: ["#FF6B6B", "#4DABF7"],
          borderWidth: 0,
          hoverOffset: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: "60%",
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                const pct = total > 0 ? Math.round(ctx.raw / total * 100) : 0;
                return `${ctx.label}: ${ctx.raw}명 (${pct}%)`;
              }
            }
          }
        }
      }
    });
  });
}

// 데이터 업데이트
function updateData() {
  fetch(WEB_APP_URL)
    .then(res => res.json())
    .then(data => {
      const rows = data.slice(1); // 헤더 제외
      const scores = {};
      const qCount = QUESTIONS.map(() => [0, 0]); // [A선택수, B선택수]

      rows.forEach(r => {
        const name = r[0];
        const q = r[1];       // 문제 번호 (1~3)
        const score = r[2];   // 점수
        const choice = r[3] !== undefined ? Number(r[3]) : (score > 0 ? 1 : 0); // 선택 (0=A, 1=B)

        if (!scores[name]) scores[name] = { q: ["-", "-", "-"], total: 0 };
        scores[name].q[q - 1] = score;
        scores[name].total = scores[name].q.reduce((a, b) => a + (typeof b === "number" ? b : 0), 0);

        if (q >= 1 && q <= QUESTIONS.length) {
          qCount[q - 1][choice]++;
        }
      });

      // 차트 업데이트
      charts.forEach((chart, i) => {
        chart.data.datasets[0].data = qCount[i];
        chart.update("none");

        const total = qCount[i][0] + qCount[i][1];
        const pctA = total > 0 ? Math.round(qCount[i][0] / total * 100) : 0;
        const pctB = total > 0 ? Math.round(qCount[i][1] / total * 100) : 0;
        document.getElementById(`pct-${i}-a`).textContent = total > 0 ? `(${pctA}%)` : "";
        document.getElementById(`pct-${i}-b`).textContent = total > 0 ? `(${pctB}%)` : "";
      });

      // 점수 테이블 업데이트
      const entries = Object.entries(scores).sort((a, b) => b[1].total - a[1].total);
      const tbody = document.getElementById("score-tbody");

      document.getElementById("player-count").textContent = entries.length;
      document.getElementById("score-badge").textContent = entries.length + "명";

      if (entries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="no-data">아직 제출된 데이터가 없습니다</td></tr>';
        return;
      }

      tbody.innerHTML = entries.map(([name, info], idx) => {
        const rank = idx + 1;
        const rankClass = rank <= 3 ? `rank-${rank}` : "rank-n";
        return `<tr>
          <td><span class="rank ${rankClass}">${rank}</span>${name}</td>
          <td>${info.q[0]}</td>
          <td>${info.q[1]}</td>
          <td>${info.q[2]}</td>
          <td class="total-score">${info.total}</td>
        </tr>`;
      }).join("");
    })
    .catch(err => console.error("데이터 로드 실패:", err));
}

// 데이터 초기화
function resetData() {
  fetch(WEB_APP_URL + "?action=reset", { method: "GET" })
    .then(() => updateData())
    .catch(() => alert("초기화 실패"));
}

// 초기화 & 주기적 업데이트
generateQR();
initCharts();
updateData();
setInterval(updateData, 3000);
</script>
</body>
</html>
